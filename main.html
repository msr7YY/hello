<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>heya</title><style>body{cursor:url(items/cursor.cur),auto!important;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;overflow:hidden;perspective:1000px}.heart{position:relative;width:70px;height:70px;background:0 0;animation:draw forwards;transition:transform 0.1s ease-out;z-index:2}.heart::after,.heart::before{content:'';position:absolute;top:0;width:50px;height:80px;border-radius:100px 100px 0 0;background:palevioletred;box-shadow:0 0 20px palevioletred;animation:glow .4s forwards}.heart::before{left:50px;transform:rotate(-45deg);transform-origin:0 100%}.heart::after{left:0;transform:rotate(45deg);transform-origin:100% 100%;box-shadow:0 0 20px palevioletred,0 0 2 20px palevioletred}.heart:hover{background:red;filter:drop-shadow(1px 1px 20px red);cursor:url(items/rose.cur),auto!important}.heart:hover::after,.heart:hover::before{background-color:red;box-shadow:0 0 5px red,0 0 10px red;animation:ease-in-out}.bg-s{position:absolute;background:#fff;border-radius:50%;opacity:0.3;pointer-events:none}.star{position:absolute;background-color:paleturquoise;width:15px;height:15px;border-radius:50%;pointer-events:none;animation:star-explosion .8s forwards}@keyframes draw{0%{opacity:0}100%{background:0 0;opacity:1}}@keyframes glow{0%{box-shadow:0 0 5px palevioletred}100%{box-shadow:0 0 30px palevioletred}}@keyframes star-explosion{0%{transform:scale(0);opacity:1;box-shadow:0 0 20px paleturquoise}100%{transform:scale(3);opacity:0;box-shadow:0 0 50px paleturquoise}}</style></head><body><div id="bg"></div><div class="heart" id="h"></div><script>(function(){const d=document,b=d.body,h=d.getElementById("h"),g=d.getElementById("bg");let p=[],t,s=[];for(let i=0;i<50;i++){const e=d.createElement("div");e.className="bg-s";const x=Math.random()*100,y=Math.random()*100,z=Math.random()*2+1;e.style.cssText=`left:${x}%;top:${y}%;width:${z}px;height:${z}px;`;g.appendChild(e);s.push({e:e,x:x,y:y,v:z/5})}d.addEventListener("mousemove",e=>{const mx=(window.innerWidth/2-e.pageX),my=(window.innerHeight/2-e.pageY);h.style.transform=`translate(${mx/25}px,${my/25}px)`;s.forEach(o=>{o.e.style.transform=`translate(${mx*o.v}px,${my*o.v}px)`});p.push({x:e.pageX,y:e.pageY});if(p.length>1){const l=p[p.length-2],curr=p[p.length-1],dis=Math.sqrt(Math.pow(curr.x-l.x,2)+Math.pow(curr.y-l.y,2));const n=d.createElement("div");n.style.cssText=`position:absolute;background:pink;width:${dis}px;height:${Math.min(2,dis/3)}px;transform-origin:0 0;transform:rotate(${Math.atan2(curr.y-l.y,curr.x-l.x)}rad);left:${l.x}px;top:${l.y}px;box-shadow:0 0 5px paleturquoise;z-index:1;pointer-events:none;`;b.appendChild(n);setTimeout(()=>n.remove(),600)}clearTimeout(t);t=setTimeout(()=>p.shift(),100)});const E=e=>{const s=d.createElement("div"),px=e.touches?e.touches[0].pageX:e.pageX,py=e.touches?e.touches[0].pageY:e.pageY;s.style.left=`${px-10}px`;s.style.top=`${py-10}px`;s.className="star";b.appendChild(s);setTimeout(()=>s.remove(),800)};d.addEventListener("click",E);d.addEventListener("touchstart",E);d.addEventListener("contextmenu",e=>e.preventDefault());window.onblur=()=>d.title="heya";window.onfocus=()=>d.title="site";})()</script></body></html>
