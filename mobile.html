<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shush</title><style>body{background-color:#1a1a1a;color:#d1d1d1;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;margin:0}.content{text-align:center;margin-bottom:24px}h1{font-size:1.2rem;font-weight:500;margin:0 0 8px 0;color:#fff}p{font-size:.9rem;margin:0;color:#999}.input-container{display:flex;flex-direction:column;gap:12px;width:250px}input{background:#2a2a2a;border:1px solid #444;border-radius:6px;padding:10px;color:#fff;font-size:.9rem;outline:0}input:focus{border-color:#666}button{padding:10px;font-size:.9rem;background-color:#333;color:#ccc;border:none;border-radius:6px;cursor:pointer;transition:background .2s}button:hover{background-color:#444;color:#fff}</style></head><body><div class="content"><h1>Hi, how are ya?</h1><p>Please switch to desktop view.</p></div><div class="input-container"><input id="i" placeholder="Type something..."><button id="b">Enter</button></div><script>(function(){const d=document,w=window,s=w.speechSynthesis;let v=[];const l=()=>{v=s.getVoices();if(!v.length)s.onvoiceschanged=l};l();d.addEventListener("contextmenu",e=>e.preventDefault());w.addEventListener("blur",()=>d.title="Dont Forget!");w.addEventListener("focus",()=>d.title="Shush");d.getElementById("b").addEventListener("click",()=>{if(!s)return alert("Error");let t=d.getElementById("i").value.trim()||"Please return to your desktop.";const m=new SpeechSynthesisUtterance(t),p=['Google UK English Female','Google US English','Microsoft Zira','en-GB','en-US'];let f=null;for(const n of p){f=v.find(x=>x.name.includes(n)||x.lang.includes(n));if(f)break}if(f)m.voice=f;s.speak(m)})})()</script></body></html>
